<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDB</title>
  <meta name="description" content="BDB kurumsal ürün tedariki." />
  <style>
    :root {
      --bg: #eef3f7;
      --surface: #ffffff;
      --text: #23384d;
      --muted: #6d7f90;
      --line: #d8e1ea;
      --blue: #1699df;
      --blue-dark: #23445f;
      --max: 1180px;
      --shadow: 0 10px 28px rgba(20, 42, 64, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #eef3f7 0%, #f7f9fb 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 32px, var(--max)); margin: 0 auto; }

    .header {
      padding: 22px 0 18px;
    }

    .header-box {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 300px 1fr 220px;
      align-items: center;
      padding: 22px 26px 20px;
      gap: 18px;
      backdrop-filter: blur(10px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      min-height: 74px;
    }

    .logo-image {
      display: block;
      height: 92px;
      width: auto;
      object-fit: contain;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      font-size: 0.96rem;
      font-weight: 700;
    }

    .nav a {
      padding-bottom: 6px;
      border-bottom: 3px solid transparent;
    }

    .nav a:hover,
    .nav a.active {
      border-color: var(--blue-dark);
    }

    .header-note {
      justify-self: end;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero {
      padding: 18px 0 48px;
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      min-height: 560px;
      background:
        linear-gradient(115deg, rgba(17, 39, 59, 0.82), rgba(31, 69, 99, 0.68)),
        radial-gradient(circle at top right, rgba(22,153,223,0.22), transparent 30%),
        linear-gradient(145deg, #425d77, #5f7891 56%, #3f566e);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      padding: 56px;
    }

    .hero-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(30deg, transparent 0 35%, rgba(255,255,255,0.08) 35% 38%, transparent 38%),
        linear-gradient(128deg, transparent 0 60%, rgba(255,255,255,0.08) 60% 64%, transparent 64%),
        linear-gradient(150deg, transparent 0 68%, rgba(0,0,0,0.14) 68% 72%, transparent 72%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 560px;
      color: white;
    }

    .hero-kicker {
      margin-bottom: 16px;
      color: rgba(255,255,255,0.86);
      font-size: 0.86rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .hero h1 {
      margin: 0 0 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 6vw, 5.2rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      max-width: 8ch;
    }

    .hero p {
      margin: 0;
      max-width: 36ch;
      color: rgba(255,255,255,0.88);
      line-height: 1.8;
      font-size: 1.02rem;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 128px;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
    }

    .footer {
      background: var(--surface);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      padding: 18px 0 26px;
    }

    @media (max-width: 1020px) {
      .header-box {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .logo-wrap,
      .header-note {
        justify-self: center;
      }

      .hero-box {
        min-height: 460px;
        padding: 36px 28px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-box">
      <a href="/" class="logo-wrap">
        <img class="logo-image" src="/logo-bdb.png" alt="BDB logo" />
      </a>

      <nav class="nav">
        <a class="active" href="/">Ana Sayfa</a>
        <a href="/kurumsal/">Kurumsal</a>
        <a href="/urunler/">Ürünler</a>
        <a href="/iletisim/">İletişim</a>
      </nav>

      <div class="header-note">bdbsource.com.tr</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-box">
        <div class="hero-content">
          <div class="hero-kicker">BDB</div>
          <h1>Kurumsal ürün tedariki.</h1>
          <p>
            Ambalaj, hijyen ve operasyonel sarf gruplarında sade, güven veren ve
            düzenli bir kurumsal sunum.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="/urunler/">Ürünler</a>
            <a class="button" href="/iletisim/">İletişim</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">© 2026 bdbsource.com.tr</div>
  </footer>
</body>
</html>
