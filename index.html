<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDB | Tedarik Desteği</title>
  <meta name="description" content="BDB tedarik desteği" />

  <link rel="icon" type="image/x-icon" href="/favicon-logo-only.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-logo-only.png">
  <link rel="apple-touch-icon" href="/favicon-logo-only.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0f1113;
      --bg-soft:#15181b;
      --panel:#1b1f23;
      --line:#2a3036;
      --text:#f3f5f7;
      --muted:#9ea7b0;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Inter", Arial, sans-serif;
      background:linear-gradient(180deg,#0f1113 0%, #15181b 100%);
      color:var(--text);
    }

    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .container{width:min(100% - 32px, var(--max));margin:0 auto}

    .header{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(15,17,19,.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.04);
    }

    .header-inner{
      min-height:82px;
      display:grid;
      grid-template-columns:220px 1fr 160px;
      align-items:center;
      gap:18px;
    }

    .logo{
      display:flex;
      align-items:center;
      min-height:60px;
    }

    .logo img{
      height:68px;
      width:auto;
      object-fit:contain;
    }

    .nav{
      display:flex;
      justify-content:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--muted);
      font-size:.95rem;
      font-weight:600;
