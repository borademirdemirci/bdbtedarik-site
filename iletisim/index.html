<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon-logo-only.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-logo-only.png">
<link rel="apple-touch-icon" href="/favicon-logo-only.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim | BDB</title>
  <meta name="description" content="BDB iletişim sayfası." />
  <style>
    :root {
      --bg: #eef3f7;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --text: #23384d;
      --muted: #6d7f90;
      --line: #d8e1ea;
      --blue: #1699df;
      --blue-dark: #23445f;
      --max: 1180px;
      --shadow: 0 10px 28px rgba(20, 42, 64, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 32px, var(--max)); margin: 0 auto; }

    .header { padding: 22px 0 18px; }
    .header-box {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 300px 1fr 220px;
      align-items: center;
      padding: 22px 26px 20px;
      gap: 18px;
    }

    .logo-wrap { display: flex; align-items: center; min-height: 74px; }
    .logo-image { display: block; height: 92px; width: auto; object-fit: contain; }

    .nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      font-size: 0.96rem;
      font-weight: 700;
    }

    .nav a { padding-bottom: 6px; border-bottom: 3px solid transparent; }
    .nav a:hover, .nav a.active { border-color: var(--blue-dark); }

    .header-note {
      justify-self: end;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .page {
      padding: 18px 0 30px;
    }

    .box {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 38px 32px;
    }

    h1 {
      margin: 0 0 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 70ch;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .item {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      padding: 22px 18px;
    }

    .item strong {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .item a,
    .item span {
      color: var(--blue-dark);
      font-weight: 700;
    }

    .footer {
      background: var(--surface);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      padding: 18px 0 26px;
    }

    @media (max-width: 1020px) {
      .header-box {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .logo-wrap, .header-note { justify-self: center; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-box">
      <a href="/" class="logo-wrap">
        <img class="logo-image" src="/logo-bdb.png" alt="BDB logo" />
      </a>

      <nav class="nav">
        <a href="/">Ana Sayfa</a>
        <a href="/kurumsal/">Kurumsal</a>
        <a href="/urunler/">Ürünler</a>
        <a class="active" href="/iletisim/">İletişim</a>
      </nav>

      <div class="header-note">bdbsource.com.tr</div>
    </div>
  </header>

  <main class="page">
    <div class="container box">
      <h1>İletişim</h1>
      <p>Bilgi ve teklif talepleriniz için bizimle iletişime geçebilirsiniz.</p>

      <div class="row">
        <div class="item">
          <strong>E-posta</strong>
          <a href="mailto:info@bdbsource.com.tr">info@bdbsource.com.tr</a>
        </div>
        <div class="item">
          <strong>Talep</strong>
          <span>Ürün bilgisi ve fiyat talebi</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 bdbsource.com.tr</div>
  </footer>
</body>
</html>
